global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'coaching-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3000']
        labels:
          service: 'coaching-api'

  - job_name: 'n8n'
    metrics_path: /metrics
    static_configs:
      - targets: ['n8n:5678']
        labels:
          service: 'n8n'
