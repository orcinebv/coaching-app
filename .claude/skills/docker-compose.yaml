name: docker_compose_creator
description: Maakt complete docker-compose setup voor de coaching-app
version: 1.0.0

triggers:
  keywords: ["docker", "compose", "container", "local", "ontwikkeling"]
  intent: "containerisatie"

steps:
  - type: file
    path: "docker-compose.yml"
    content: |
      version: '3.8'
      
      services:
        # PostgreSQL database
        postgres:
          image: postgres:15-alpine
          container_name: coaching-postgres
          environment:
            POSTGRES_DB: coaching
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
            PGDATA: /var/lib/postgresql/data/pgdata
          ports:
            - "5432:5432"
          volumes:
            - postgres_data:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d coaching"]
            interval: 10s
            timeout: 5s
            retries: 5
          networks:
            - coaching-network
          restart: unless-stopped
      
        # Redis for caching and session storage
        redis:
          image: redis:7-alpine
          container_name: coaching-redis
          ports:
            - "6379:6379"
          volumes:
            - redis_data:/data
          command: redis-server --appendonly yes
          healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
          networks:
            - coaching-network
          restart: unless-stopped
      
        # n8n workflow automation
        n8n:
          image: n8nio/n8n:latest
          container_name: coaching-n8n
          environment:
            - N8N_PORT=5678
            - N8N_PROTOCOL=http
            - NODE_ENV=production
            - N8N_DATABASE_TYPE=postgresdb
            - N8N_DATABASE_HOST=postgres
            - N8N_DATABASE_PORT=5432
            - N8N_DATABASE_NAME=n8n
            - N8N_DATABASE_USER=${DB_USER:-postgres}
            - N8N_DATABASE_PASSWORD=${DB_PASSWORD:-postgres}
            - N8N_USER_FOLDER=/home/node/.n8n
            - WEBHOOK_URL=http://localhost:5678/
            - EXECUTIONS_DATA_PRUNE=true
            - EXECUTIONS_DATA_MAX_AGE=168
            - GENERIC_TIMEZONE=Europe/Amsterdam
          ports:
            - "5678:5678"
          volumes:
            - n8n_data:/home/node/.n8n
            - ./n8n/workflows:/home/node/.n8n/workflows
          depends_on:
            postgres:
              condition: service_healthy
          networks:
            - coaching-network
          restart: unless-stopped
      
        # Coaching API (NestJS)
        coaching-api:
          build:
            context: .
            dockerfile: apps/coaching-api/Dockerfile
            target: development
          container_name: coaching-api
          environment:
            - NODE_ENV=development
            - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/coaching
            - REDIS_URL=redis://redis:6379
            - N8N_WEBHOOK_URL=http://n8n:5678/webhook
            - N8N_API_KEY=${N8N_API_KEY:-dev-key}
            - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
            - API_PORT=3333
          ports:
            - "3333:3333"
          volumes:
            - ./apps/coaching-api:/app/apps/coaching-api
            - ./libs:/app/libs
            - /app/node_modules
          depends_on:
            postgres:
              condition: service_healthy
            redis:
              condition: service_healthy
          networks:
            - coaching-network
          command: pnpm nx serve coaching-api
      
        # Coaching Web (Angular)
        coaching-web:
          build:
            context: .
            dockerfile: apps/coaching-web/Dockerfile
            target: development
          container_name: coaching-web
          environment:
            - NODE_ENV=development
          ports:
            - "4200:4200"
          volumes:
            - ./apps/coaching-web:/app/apps/coaching-web
            - ./libs:/app/libs
            - /app/node_modules
          depends_on:
            - coaching-api
          networks:
            - coaching-network
          command: pnpm nx serve coaching-web
      
        # pgAdmin for database management (optional)
        pgadmin:
          image: dpage/pgadmin4
          container_name: coaching-pgadmin
          environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@coaching.nl}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
          ports:
            - "5050:80"
          volumes:
            - pgadmin_data:/var/lib/pgadmin
          depends_on:
            - postgres
          networks:
            - coaching-network
          restart: unless-stopped
      
      volumes:
        postgres_data:
        redis_data:
        n8n_data:
        pgadmin_data:
      
      networks:
        coaching-network:
          driver: bridge
  
  - type: file
    path: "apps/coaching-api/Dockerfile"
    content: |
      # Development stage
      FROM node:18-alpine AS development
      
      WORKDIR /app
      
      # Copy package files
      COPY package*.json ./
      COPY pnpm-lock.yaml ./
      
      # Install pnpm
      RUN npm install -g pnpm
      RUN pnpm install
      
      # Copy source code
      COPY . .
      
      # Expose port
      EXPOSE 3333
      
      # Start in development mode
      CMD ["pnpm", "nx", "serve", "coaching-api"]
      
      # Production stage
      FROM node:18-alpine AS production
      
      WORKDIR /app
      
      # Copy package files
      COPY package*.json ./
      COPY pnpm-lock.yaml ./
      
      # Install pnpm and dependencies
      RUN npm install -g pnpm
      RUN pnpm install --prod
      
      # Copy built application
      COPY --from=development /app/dist/apps/coaching-api ./dist
      
      # Create non-root user
      RUN addgroup -g 1001 -S nodejs
      RUN adduser -S nodejs -u 1001
      USER nodejs
      
      # Expose port
      EXPOSE 3333
      
      # Health check
      HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
        CMD node -e "require('http').get('http://localhost:3333/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})" || exit 1
      
      # Start application
      CMD ["node", "dist/main"]
  
  - type: file
    path: "apps/coaching-web/Dockerfile"
    content: |
      # Development stage
      FROM node:18-alpine AS development
      
      WORKDIR /app
      
      # Copy package files
      COPY package*.json ./
      COPY pnpm-lock.yaml ./
      
      # Install pnpm
      RUN npm install -g pnpm
      RUN pnpm install
      
      # Copy source code
      COPY . .
      
      # Expose port
      EXPOSE 4200
      
      # Start in development mode
      CMD ["pnpm", "nx", "serve", "coaching-web", "--host", "0.0.0.0"]
      
      # Production stage
      FROM nginx:alpine AS production
      
      # Copy built application from development stage
      COPY --from=development /app/dist/apps/coaching-web /usr/share/nginx/html
      
      # Copy nginx configuration
      COPY apps/coaching-web/nginx.conf /etc/nginx/nginx.conf
      
      # Expose port
      EXPOSE 80
      
      # Health check
      HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
        CMD wget -qO- http://localhost/ || exit 1
      
      # Start nginx
      CMD ["nginx", "-g", "daemon off;"]
  
  - type: file
    path: "apps/coaching-web/nginx.conf"
    content: |
      events {
        worker_connections 1024;
      }
      
      http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
      
        server {
          listen 80;
          server_name localhost;
          root /usr/share/nginx/html;
          index index.html;
      
          location / {
            try_files $uri $uri/ /index.html;
          }
      
          # Cache static assets
          location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
          }
      
          # Security headers
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-XSS-Protection "1; mode=block" always;
        }
      }
  
  - type: file
    path: ".env.example"
    content: |
      # Database
      DB_USER=postgres
      DB_PASSWORD=postgres
      
      # JWT
      JWT_SECRET=your-super-secret-jwt-key-change-in-production
      
      # n8n
      N8N_API_KEY=dev-n8n-api-key
      
      # OpenAI
      OPENAI_API_KEY=your-openai-api-key
      
      # pgAdmin (optional)
      PGADMIN_EMAIL=admin@coaching.nl
      PGADMIN_PASSWORD=admin
  
  - type: file
    path: "docker-compose.prod.yml"
    content: |
      version: '3.8'
      
      services:
        postgres:
          image: postgres:15-alpine
          environment:
            POSTGRES_DB: coaching
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
          volumes:
            - postgres_data:/var/lib/postgresql/data
          restart: always
          networks:
            - coaching-network
      
        redis:
          image: redis:7-alpine
          command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
          volumes:
            - redis_data:/data
          restart: always
          networks:
            - coaching-network
      
        n8n:
          image: n8nio/n8n:latest
          environment:
            - N8N_PORT=5678
            - N8N_PROTOCOL=https
            - NODE_ENV=production
            - N8N_DATABASE_TYPE=postgresdb
            - N8N_DATABASE_HOST=postgres
            - N8N_DATABASE_PORT=5432
            - N8N_DATABASE_NAME=n8n
            - N8N_DATABASE_USER=${DB_USER}
            - N8N_DATABASE_PASSWORD=${DB_PASSWORD}
            - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
            - WEBHOOK_URL=https://n8n.jouwdomein.nl
            - EXECUTIONS_DATA_PRUNE=true
            - EXECUTIONS_DATA_MAX_AGE=168
          volumes:
            - n8n_data:/home/node/.n8n
          restart: always
          networks:
            - coaching-network
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.n8n.rule=Host(`n8n.jouwdomein.nl`)"
            - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      
        coaching-api:
          image: ${DOCKER_REGISTRY}/coaching-api:${TAG}
          environment:
            - NODE_ENV=production
            - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/coaching
            - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
            - N8N_WEBHOOK_URL=https://n8n.jouwdomein.nl/webhook
            - N8N_API_KEY=${N8N_API_KEY}
            - JWT_SECRET=${JWT_SECRET}
          restart: always
          networks:
            - coaching-network
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.api.rule=Host(`api.jouwdomein.nl`)"
            - "traefik.http.services.api.loadbalancer.server.port=3333"
      
        coaching-web:
          image: ${DOCKER_REGISTRY}/coaching-web:${TAG}
          restart: always
          networks:
            - coaching-network
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.web.rule=Host(`app.jouwdomein.nl`)"
            - "traefik.http.services.web.loadbalancer.server.port=80"
      
        traefik:
          image: traefik:v2.9
          command:
            - "--api.insecure=true"
            - "--providers.docker=true"
            - "--providers.docker.exposedbydefault=false"
            - "--entrypoints.web.address=:80"
            - "--entrypoints.websecure.address=:443"
            - "--certificatesresolvers.letsencrypt.acme.email=admin@jouwdomein.nl"
            - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
            - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
            - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
          ports:
            - "80:80"
            - "443:443"
            - "8080:8080"
          volumes:
            - "/var/run/docker.sock:/var/run/docker.sock:ro"
            - "traefik_letsencrypt:/letsencrypt"
          restart: always
          networks:
            - coaching-network
      
      volumes:
        postgres_data:
        redis_data:
        n8n_data:
        traefik_letsencrypt:
      
      networks:
        coaching-network:
          driver: bridge
  
  - type: command
    command: "docker-compose config"
    cwd: "."
    optional: true
  
  - type: message
    content: |
      ✅ Docker setup compleet!
      
      Bestanden aangemaakt:
      - docker-compose.yml (ontwikkeling)
      - docker-compose.prod.yml (productie)
      - apps/coaching-api/Dockerfile
      - apps/coaching-web/Dockerfile
      - .env.example
      
      Om te starten:
      cp .env.example .env
      docker-compose up -d
      
      Services:
      - Frontend: http://localhost:4200
      - API: http://localhost:3333
      - n8n: http://localhost:5678
      - pgAdmin: http://localhost:5050
      - Database: localhost:5432

output: "Complete Docker setup voor ontwikkeling en productie"