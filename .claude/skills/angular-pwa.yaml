name: angular_pwa_configurator
description: Configureert Angular PWA met service worker en manifest
version: 1.0.0

triggers:
  keywords: ["pwa", "offline", "service worker", "manifest", "installatie"]
  intent: "maak pwa"

parameters:
  - name: project
    type: string
    description: "Angular project naam"
    default: "coaching-web"

steps:
  - type: command
    command: "cd apps/{{project}} && pnpm add @angular/pwa"
    cwd: "."
  
  - type: command
    command: "nx g @angular/pwa:ng-add --project={{project}} --target=build"
    cwd: "."
  
  - type: file
    path: "apps/{{project}}/src/manifest.webmanifest"
    content: |
